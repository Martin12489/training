<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black"/>
<meta name="apple-mobile-web-app-title" content="Training"/>
<meta name="theme-color" content="#0E0E0C"/>
<title>Training Tracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#0E0E0C;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;color:#F0EDE8}
:root{
  --bg:#0E0E0C;--s1:#161614;--s2:#1E1E1B;--s3:#262622;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#F0EDE8;--text2:#8A8880;--text3:#4A4845;
  --green:#1BF07E;--gdim:#0DB859;--gbg:rgba(27,240,126,0.10);
  --amber:#F0A030;--abg:rgba(240,160,48,0.10);
  --purple:#9B8FFF;--pbg:rgba(155,143,255,0.10);
  --blue:#4A9EF0;--bbg:rgba(74,158,240,0.10);
  --red:#FF5A5A;--rbg:rgba(255,90,90,0.10);
  --radius:16px;--rsm:12px;--rxs:8px;
}
.app{max-width:430px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
.header{background:var(--bg);border-bottom:1px solid var(--border);padding:env(safe-area-inset-top,20px) 20px 0;position:sticky;top:0;z-index:50}
.header-top{display:flex;align-items:center;justify-content:space-between;padding:14px 0 12px}
.app-title{font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--text3)}
.header-right{display:flex;align-items:center;gap:8px}
.today-btn{font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer}
.today-btn.active{background:var(--gbg);border-color:rgba(27,240,126,0.3);color:var(--green)}
.week-pill{background:var(--gbg);color:var(--green);font-size:12px;font-weight:700;padding:5px 12px;border-radius:20px;border:1px solid rgba(27,240,126,0.2)}
.week-row{display:flex;align-items:center;justify-content:space-between;padding-bottom:12px}
.week-nav{display:flex;align-items:center;gap:8px}
.nav-btn{width:32px;height:32px;border-radius:var(--rxs);border:1px solid var(--border2);background:var(--s2);cursor:pointer;color:var(--text2);font-size:18px;display:flex;align-items:center;justify-content:center}
.nav-btn:active{background:var(--s3)}
.week-name{font-size:22px;font-weight:700;color:var(--text);min-width:80px;text-align:center;letter-spacing:-.5px}
.prog-wrap{padding-bottom:12px}
.prog-track{height:3px;background:var(--s3);border-radius:2px}
.prog-fill{height:3px;background:var(--green);border-radius:2px;transition:width .5s ease}
.prog-row{display:flex;justify-content:space-between;margin-top:6px}
.prog-pct{font-size:11px;font-weight:700;color:var(--green)}
.prog-lbl{font-size:11px;color:var(--text3)}
.day-tabs{display:flex;gap:5px;padding:10px 20px 12px;overflow-x:auto;background:var(--bg)}
.day-tabs::-webkit-scrollbar{display:none}
.day-btn{flex-shrink:0;padding:8px 13px;border-radius:20px;border:1px solid var(--border2);background:transparent;font-size:13px;font-weight:600;color:var(--text2);cursor:pointer;transition:all .2s;position:relative}
.day-btn.active{background:var(--green);border-color:var(--green);color:#000}
.day-btn.done{border-color:var(--gdim);color:var(--gdim)}
.day-btn.sa.active{background:var(--green);border-color:var(--green);color:#000}
.day-btn.so.active{background:var(--purple);border-color:var(--purple);color:#000}
.day-btn.so.done{border-color:var(--purple);color:var(--purple)}
.day-btn.fr{color:var(--text3);border-color:var(--border)}
.day-btn.today-dot::after{content:'';width:5px;height:5px;border-radius:50%;background:var(--amber);position:absolute;top:4px;right:4px}
.scroll{flex:1;overflow-y:auto;padding:20px 20px 100px}
.lbl{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin:0 0 10px}
.day-hdr{background:var(--s1);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.day-title{font-size:18px;font-weight:700;color:var(--text);letter-spacing:-.3px}
.day-meta{font-size:12px;color:var(--text2);margin-top:4px}
.day-ct{font-size:28px;font-weight:700;color:var(--green);letter-spacing:-1px}
.day-ct span{font-size:14px;font-weight:500;color:var(--text3)}
.ex-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:8px}
.ex-card.dn{border-color:rgba(27,240,126,0.3);background:rgba(27,240,126,0.05)}
.ex-row{display:flex;align-items:center;gap:12px}
.chk{width:28px;height:28px;border-radius:50%;border:2px solid var(--border2);background:transparent;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s}
.chk.on{background:var(--green);border-color:var(--green)}
.chk.pur.on{background:var(--purple);border-color:var(--purple)}
.chk svg{display:none;width:14px;height:14px}.chk.on svg{display:block}
.ex-name{flex:1;font-size:14px;font-weight:600;color:var(--text)}
.ex-card.dn .ex-name{color:var(--text3);text-decoration:line-through}
.ex-s{font-size:12px;color:var(--text2);white-space:nowrap;background:var(--s3);padding:3px 8px;border-radius:6px}
.w-row{display:flex;align-items:center;gap:8px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.w-row label{font-size:11px;color:var(--text3);font-weight:600;letter-spacing:.05em;text-transform:uppercase}
.w-inp{width:72px;height:32px;border:1px solid var(--border2);border-radius:var(--rxs);background:var(--s3);color:var(--text);font-size:15px;font-weight:700;padding:0 8px;text-align:center}
.ex-note{font-size:11px;color:var(--text2);margin-top:8px;padding-top:8px;border-top:1px solid var(--border);line-height:1.5}
.pause-chip{font-size:10px;color:var(--text3);margin-top:4px}
.glute-bar{background:var(--pbg);border:1px solid rgba(155,143,255,0.2);border-radius:var(--rsm);padding:9px 14px;margin-bottom:10px;font-size:11px;color:var(--purple);line-height:1.6}
.glute-bar strong{font-weight:600;display:block;margin-bottom:3px}
.z2-eve{background:rgba(27,240,126,0.07);border:1px solid rgba(27,240,126,0.2);border-radius:var(--rsm);padding:12px 14px;margin-top:10px}
.z2-eve-title{font-size:12px;font-weight:600;color:var(--green);margin-bottom:5px}
.z2-eve-item{font-size:12px;color:var(--text2);padding:2px 0;display:flex;align-items:center;gap:6px}
.z2-eve-item::before{content:'·';color:var(--green)}
.cnd-btn{width:100%;padding:14px;border-radius:var(--rsm);border:1px solid var(--border2);background:transparent;color:var(--text2);font-size:14px;font-weight:600;cursor:pointer;margin-top:10px;transition:all .2s}
.cnd-btn.on{background:var(--green);border-color:var(--green);color:#000}
.banner{border-radius:var(--radius);padding:14px 16px;margin-bottom:14px;display:flex;align-items:center;gap:12px}
.banner.g{background:var(--gbg);border:1px solid rgba(27,240,126,0.25)}
.banner.p{background:var(--pbg);border:1px solid rgba(155,143,255,0.25)}
.banner .bi{font-size:28px}.banner p{font-size:14px;font-weight:700}
.banner.g p{color:var(--green)}.banner.p p{color:var(--purple)}
.rest-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--radius);padding:32px 20px;text-align:center;margin-bottom:12px}
.rest-icon{font-size:48px;margin-bottom:14px}
.rest-title{font-size:20px;font-weight:700;color:var(--text);margin-bottom:8px}
.rest-text{font-size:14px;color:var(--text2);line-height:1.7}
.rest-q{margin-top:20px;padding:12px 16px;background:var(--s2);border-radius:var(--rsm);border-left:2px solid var(--green);font-size:12px;color:var(--text2);text-align:left;line-height:1.6;font-style:italic}
.z2c{background:var(--s1);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:all .2s}
.z2c.sel{border-color:rgba(27,240,126,0.35);background:var(--gbg)}
.z2i{font-size:28px;flex-shrink:0}.z2n{font-size:15px;font-weight:700;color:var(--text)}
.z2d{font-size:12px;color:var(--text2);margin-top:2px}.z2t{font-size:11px;font-weight:700;color:var(--green);margin-top:4px}
.z2k{width:24px;height:24px;border-radius:50%;border:2px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s}
.z2c.sel .z2k{background:var(--green);border-color:var(--green)}
.z2k svg{display:none;width:13px;height:13px}.z2c.sel .z2k svg{display:block}
.ib{border-radius:var(--rsm);padding:14px 16px;margin-bottom:8px}
.ib.g{background:var(--gbg);border:1px solid rgba(27,240,126,0.15)}
.ib.p{background:var(--pbg);border:1px solid rgba(155,143,255,0.15)}
.ib-t{font-size:12px;font-weight:700;margin-bottom:5px}
.ib.g .ib-t{color:var(--green)}.ib.p .ib-t{color:var(--purple)}
.ib-tx{font-size:12px;line-height:1.7;color:var(--text2)}
.mob-hdr{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.mob-num{width:22px;height:22px;border-radius:50%;background:var(--pbg);border:1px solid rgba(155,143,255,0.3);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--purple);flex-shrink:0}
.mob-tit{font-size:12px;font-weight:700;color:var(--purple);letter-spacing:.05em;text-transform:uppercase}
.macro-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.macro-box{background:var(--s1);border:1px solid var(--border);border-radius:var(--rsm);padding:12px}
.macro-label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:6px}
.macro-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.macro-consumed{font-size:22px;font-weight:800;color:var(--text);letter-spacing:-0.5px}
.macro-target{font-size:13px;color:var(--text3)}
.macro-bar{height:4px;background:var(--s3);border-radius:2px}
.macro-bar-fill{height:4px;border-radius:2px;transition:width .3s}
.macro-inp{width:100%;height:34px;border:1px solid var(--border2);border-radius:var(--rxs);background:var(--s3);color:var(--text);font-size:15px;font-weight:700;padding:0 10px;text-align:center;margin-top:8px}
.nutr-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:12px}
.nutr-row{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:1px solid var(--border)}
.nutr-row:last-child{border-bottom:none}
.nchk{width:26px;height:26px;border-radius:var(--rxs);border:2px solid var(--border2);background:transparent;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s}
.nchk.on{background:var(--green);border-color:var(--green)}
.nchk svg{display:none;width:14px;height:14px}.nchk.on svg{display:block}
.nlbl{flex:1;font-size:14px;color:var(--text);font-weight:500}
.nlbl.dn{color:var(--text3);text-decoration:line-through}
.no-profile-box{background:var(--s1);border:1px solid rgba(240,160,48,0.3);border-radius:var(--radius);padding:18px;margin-bottom:14px;text-align:center}
.no-profile-box p{font-size:14px;color:var(--text2);margin-bottom:12px;line-height:1.6}
.go-profile-btn{background:var(--amber);color:#000;border:none;border-radius:var(--rsm);padding:10px 20px;font-size:13px;font-weight:700;cursor:pointer}
.today-banner{background:var(--gbg);border:1px solid rgba(27,240,126,0.2);border-radius:var(--rsm);padding:10px 14px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.today-banner-text{font-size:13px;font-weight:600;color:var(--green)}
.today-banner-sub{font-size:11px;color:var(--gdim);margin-top:2px}
.profile-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.profile-field{margin-bottom:16px}
.profile-field:last-child{margin-bottom:0}
.field-label{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:8px}
.field-input{width:100%;height:44px;border:1px solid var(--border2);border-radius:var(--rsm);background:var(--s3);color:var(--text);font-size:17px;font-weight:600;padding:0 14px}
.gender-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.gender-btn{padding:12px;border-radius:var(--rsm);border:1px solid var(--border2);background:transparent;font-size:15px;font-weight:600;color:var(--text2);cursor:pointer;text-align:center;transition:all .2s}
.gender-btn.on{background:var(--green);border-color:var(--green);color:#000}
.goal-row{display:flex;flex-direction:column;gap:8px}
.goal-btn{padding:12px 16px;border-radius:var(--rsm);border:1px solid var(--border2);background:transparent;font-size:14px;font-weight:600;color:var(--text2);cursor:pointer;text-align:left;transition:all .2s;display:flex;justify-content:space-between;align-items:center}
.goal-btn .gs{font-size:11px;font-weight:500;color:var(--text3);margin-top:2px}
.goal-btn.on{border-color:var(--green);color:var(--text)}
.goal-btn.on .gs{color:var(--green)}
.save-btn{width:100%;padding:16px;border-radius:var(--rsm);background:var(--green);border:none;color:#000;font-size:16px;font-weight:700;cursor:pointer;margin-top:4px}
.targets-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.target-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}
.target-row:last-child{border-bottom:none}
.target-label{font-size:14px;color:var(--text2);display:flex;align-items:center;gap:8px}
.target-icon{font-size:18px}
.target-main{font-size:16px;font-weight:700;color:var(--text)}
.target-sub{font-size:11px;color:var(--text3);margin-top:1px;text-align:right}
.gc{background:var(--s1);border:1px solid var(--border);border-radius:var(--radius);padding:4px 0;margin-bottom:12px;overflow:hidden}
.gr{display:flex;gap:12px;padding:10px 16px;border-bottom:1px solid var(--border);font-size:13px}
.gr:last-child{border-bottom:none}
.gl{color:var(--text3);width:90px;flex-shrink:0;font-size:12px;font-weight:600;letter-spacing:.04em;text-transform:uppercase}
.gv{color:var(--text);font-weight:600}
.hero-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px}
.hero-box{background:var(--s1);border:1px solid var(--border);border-radius:var(--radius);padding:16px;display:flex;flex-direction:column;align-items:center;text-align:center}
.hero-icon{font-size:32px;margin-bottom:6px}
.hero-num{font-size:36px;font-weight:800;letter-spacing:-1.5px;line-height:1}
.hero-num.g{color:var(--green)}.hero-num.a{color:var(--amber)}
.hero-sub{font-size:12px;color:var(--text2);margin-top:4px;font-weight:500}
.rings-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;margin-bottom:20px}
.ring-wrap{display:flex;flex-direction:column;align-items:center;gap:5px}
.ring-lbl{font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--text3)}
.pr-tabs{display:flex;gap:6px;margin-bottom:14px}
.pr-tab{flex:1;padding:9px 6px;border-radius:var(--rsm);border:1px solid var(--border2);background:transparent;font-size:12px;font-weight:700;color:var(--text2);cursor:pointer;text-align:center;transition:all .2s}
.pr-tab.on{background:var(--green);border-color:var(--green);color:#000}
.pr-chart{background:var(--s1);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:8px}
.pr-bars{display:flex;align-items:flex-end;gap:6px;height:90px;margin-bottom:8px}
.pr-bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.pr-bar{width:100%;border-radius:5px 5px 0 0;min-height:4px;background:var(--s3)}
.pr-bar.has{background:var(--green);opacity:.7}
.pr-bar.pr{background:var(--green);opacity:1}
.pr-bar.cur{background:var(--amber)}
.pr-wlbl{font-size:9px;color:var(--text3);font-weight:600}
.pr-kg{font-size:10px;font-weight:700;color:var(--text3)}
.pr-bar.has ~ .pr-kg,.pr-bar.pr ~ .pr-kg{color:var(--green)}
.pr-bar.cur ~ .pr-kg{color:var(--amber)}
.pr-legend{display:flex;align-items:center;justify-content:center;gap:14px}
.pr-leg{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2)}
.pr-leg-dot{width:8px;height:8px;border-radius:50%}
.pr-best{text-align:center;padding:12px;background:var(--gbg);border-radius:var(--rsm);border:1px solid rgba(27,240,126,0.2);margin-bottom:8px}
.pr-best-val{font-size:28px;font-weight:800;color:var(--green);letter-spacing:-1px}
.pr-best-lbl{font-size:11px;color:var(--text2);margin-top:2px}
.prog-list{background:var(--s1);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:16px}
.prog-item{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--border)}
.prog-item:last-child{border-bottom:none}
.prog-num{width:28px;height:28px;border-radius:50%;border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--text3);flex-shrink:0}
.prog-item.cur .prog-num{background:var(--green);border-color:var(--green);color:#000}
.prog-inf{flex:1}
.prog-inf strong{font-size:14px;font-weight:700;color:var(--text2)}
.prog-item.cur .prog-inf strong{color:var(--text)}
.prog-inf span{display:block;font-size:11px;color:var(--text3);margin-top:2px}
.scan-btn{width:100%;padding:16px;border-radius:var(--rsm);background:var(--green);border:none;color:#000;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:12px}
.scan-btn.loading{background:var(--s3);color:var(--text2)}
.scan-result{background:var(--s1);border:1px solid rgba(27,240,126,0.3);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.scan-result-title{font-size:13px;font-weight:700;color:var(--green);margin-bottom:10px}
.scan-item-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border)}
.scan-item-row:last-child{border-bottom:none}
.scan-item-name{font-size:13px;color:var(--text2)}
.scan-item-val{font-size:14px;font-weight:700;color:var(--text)}
.portion-row{display:flex;align-items:center;gap:10px;margin:12px 0}
.portion-row label{font-size:13px;color:var(--text2);flex:1}
.portion-inp{width:80px;height:36px;border:1px solid var(--border2);border-radius:var(--rxs);background:var(--s3);color:var(--text);font-size:16px;font-weight:700;padding:0 10px;text-align:center}
.add-to-day-btn{width:100%;padding:13px;border-radius:var(--rsm);background:var(--green);border:none;color:#000;font-size:14px;font-weight:700;cursor:pointer;margin-top:4px}
.api-setup{background:var(--s1);border:1px solid rgba(240,160,48,0.3);border-radius:var(--radius);padding:18px;margin-bottom:14px}
.api-setup-title{font-size:14px;font-weight:700;color:var(--amber);margin-bottom:6px}
.api-setup-text{font-size:12px;color:var(--text2);line-height:1.6;margin-bottom:12px}
.api-inp{width:100%;height:40px;border:1px solid var(--border2);border-radius:var(--rxs);background:var(--s3);color:var(--text);font-size:13px;padding:0 12px;margin-bottom:10px;font-family:monospace}
.api-save-btn{width:100%;padding:11px;border-radius:var(--rxs);background:var(--amber);border:none;color:#000;font-size:13px;font-weight:700;cursor:pointer}
.scan-history{background:var(--s1);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:12px}
.scan-hist-row{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;border-bottom:1px solid var(--border)}
.scan-hist-row:last-child{border-bottom:none}
.scan-hist-name{font-size:13px;font-weight:600;color:var(--text)}

// ── DATE LOGIC ───────────────────────────────────────────────────
function getTodayDay(){
  const m={0:6,1:0,2:1,3:2,4:3,5:4,6:5};
  return m[new Date().getDay()];
}
function getTodayWeek(){
  const sd=ld('tc_start_date',null);
  if(!sd)return 0;
  const start=new Date(sd);const today=new Date();
  today.setHours(0,0,0,0);start.setHours(0,0,0,0);
  const diff=Math.floor((today-start)/(1000*60*60*24));
  if(diff<0)return 0;
  return Math.min(Math.floor(diff/7),5);
}
function isToday(w,d){return w===getTodayWeek()&&d===getTodayDay();}
function goToToday(){cW=getTodayWeek();cD=getTodayDay();renderAll();}

function startPlan(){
  const today=new Date();const day=today.getDay();
  const dUM=day===1?0:(8-day)%7;
  const nextMon=new Date(today);
  nextMon.setDate(today.getDate()+dUM);
  nextMon.setHours(0,0,0,0);
  localStorage.setItem('tc_start_date',JSON.stringify(nextMon.toISOString()));
  cW=getTodayWeek();cD=getTodayDay();
  renderAll();
}

function getNextMonday(){
  const today=new Date();const day=today.getDay();
  const dUM=day===1?0:(8-day)%7;
  const nextMon=new Date(today);
  nextMon.setDate(today.getDate()+dUM);
  return nextMon.toLocaleDateString('de-DE',{weekday:'long',day:'numeric',month:'long'});
}

// ── COMPLETION ───────────────────────────────────────────────────
function dayDone(w,d){
  if(d===4)return false;
  if(d===5)return Z2.some(o=>ld(`tc_z2_w${w}_${o.id}`,false));
  if(d===6){let a=true;MOB.forEach(b=>b.exs.forEach(e=>{if(!ld(`tc_mob_w${w}_${e.id}`,false))a=false;}));return a;}
  const day=DAY_BASE[d];
  for(const ex of day.ex)if(!ld(`tc_w${w}_d${d}_ex_${ex.id}`,false))return false;
  return ld(`tc_w${w}_d${d}_cond`,false);
}
function weekDone(w){return[0,1,2,3].every(d=>dayDone(w,d));}
function totalDone(){let n=0;for(let w=0;w<6;w++)for(let d=0;d<4;d++)if(dayDone(w,d))n++;return n;}
function weekPct(w){let n=0;for(let d=0;d<4;d++)if(dayDone(w,d))n++;return Math.round(n/4*100);}
function calcStreak(){let s=0;for(let w=0;w<6;w++){if(weekDone(w))s=w+1;else break;}return s;}

// ── HEADER ───────────────────────────────────────────────────────
function updateHeader(){
  const done=totalDone();const pct=Math.round(done/24*100);
  document.getElementById('wPill').textContent='Woche '+(cW+1);
  document.getElementById('wName').textContent='Woche '+(cW+1);
  document.getElementById('hProg').textContent=done+'/24';
  document.getElementById('pFill').style.width=pct+'%';
  document.getElementById('pPct').textContent=pct+'%';
  const tw=getTodayWeek();const td=getTodayDay();
  const onToday=cW===tw&&cD===td;
  const tb=document.getElementById('todayBtn');
  if(tb){tb.className='today-btn'+(onToday?' active':'');}
  document.querySelectorAll('.day-btn').forEach((t,i)=>{
    const cl=['day-btn'];
    if(i===cD)cl.push('active');
    if(i===5)cl.push('sa');if(i===6)cl.push('so');if(i===4)cl.push('fr');
    if(i!==cD&&i!==4&&dayDone(cW,i))cl.push('done');
    if(i===td&&cW===tw&&i!==cD)cl.push('today-dot');
    t.className=cl.join(' ');
  });
}

// ── PROFILE ──────────────────────────────────────────────────────
function loadProfile(){return ld('tc_profile',{gender:'M',age:0,height:0,weight:0,goal:'fat'});}
function saveProfile(p){sv('tc_profile',p);}

const ACT_FACTORS={heavy:1.65,moderate:1.55,wod:1.65,easy:1.40,rest:1.25,zone2:1.40,mobility:1.20};
function getDayType(){
  if(cD===4)return 'rest';if(cD===5)return 'zone2';if(cD===6)return 'mobility';
  const types=['heavy','moderate','moderate','moderate'];return types[cD]||'moderate';
}
function calcTargets(){
  const p=loadProfile();
  if(!p.weight||!p.height||!p.age)return null;
  const bmr=p.gender==='M'?10*p.weight+6.25*p.height-5*p.age+5:10*p.weight+6.25*p.height-5*p.age-161;
  const dt=getDayType();const factor=ACT_FACTORS[dt]||1.4;
  const tdee=Math.round(bmr*factor);
  const isT=!['rest','mobility'].includes(dt);
  let deficit=p.goal==='fat'?(isT?-200:-350):p.goal==='recomp'?(isT?-100:-250):200;
  const kcal=Math.round(tdee+deficit);
  const protein=Math.round(p.weight*(p.goal==='fat'?(isT?2.2:2.0):2.0));
  const fat=Math.round(p.weight*0.9);
  const carbs=Math.max(Math.round((kcal-protein*4-fat*9)/4),50);
  return{kcal,protein,carbs,fat,tdee,bmr:Math.round(bmr)};
}

function resetPlan(){
  if(!confirm('Alle Trainingsdaten löschen und neu starten?'))return;

    if(k.startsWith('tc_w')||k.startsWith('tc_macro')||k.startsWith('tc_scan')||k.startsWith('tc_nutr')||k==='tc_start_date'||k==='tc_last_sync')
      localStorage.removeItem(k);
  }
  cW=0;cD=getTodayDay();
  startPlan();
}

// ── RENDER FORTSCHRITT ────────────────────────────────────────────
function renderFortschritt(){
  const done=totalDone();const streak=calcStreak();
  const hero=`<div class="hero-row"><div class="hero-box"><div class="hero-icon">🔥</div><div class="hero-num a">${streak}</div><div class="hero-sub">${streak===1?'Woche in Folge':'Wochen in Folge'}</div></div><div class="hero-box"><div class="hero-icon">✅</div><div class="hero-num g">${done}</div><div class="hero-sub">Einheiten geschafft</div></div></div>`;
  let rings='';for(let w=0;w<6;w++){
    const pct=weekPct(w);const cur=w===cW;const full=pct===100;
    const r=20;const circ=2*Math.PI*r;const offset=circ*(1-pct/100);
    const color=full?'#1BF07E':cur?'#F0A030':'#4A9EF0';const tc=full?'#1BF07E':cur?'#F0A030':'#8A8880';
    rings+=`<div class="ring-wrap"><svg width="48" height="48" viewBox="0 0 48 48"><circle cx="24" cy="24" r="${r}" fill="none" stroke="#1E1E1B" stroke-width="5"/><circle cx="24" cy="24" r="${r}" fill="none" stroke="${color}" stroke-width="5" stroke-dasharray="${circ.toFixed(1)}" stroke-dashoffset="${offset.toFixed(1)}" stroke-linecap="round" transform="rotate(-90 24 24)"/><text x="24" y="28" text-anchor="middle" fill="${tc}" font-size="11" font-weight="800" font-family="-apple-system,sans-serif">${w+1}</text></svg><div class="ring-lbl" style="color:${tc}">${pct}%</div></div>`;
  }
  const lift=PR_LIFTS[cPR];const allKgs=Array(6).fill(0);
  lift.entries.forEach(e=>{allKgs[e.w]=parseFloat(ld(e.k,''))||0;});
  const maxKg=Math.max(...allKgs,1);const bestKg=Math.max(...allKgs);
  let tabs='';PR_LIFTS.forEach((l,i)=>{tabs+=`<button class="pr-tab${i===cPR?' on':''}" onclick="setPR(${i})">${l.label}</button>`;});
  let bars='';for(let w=0;w<6;w++){const kg=allKgs[w];const hasVal=kg>0;const isPR=hasVal&&kg===bestKg;const isCur=w===cW;const hPct=hasVal?Math.max(Math.round(kg/maxKg*100),8):6;const bc=isPR?'pr-bar pr':hasVal?(isCur?'pr-bar cur':'pr-bar has'):'pr-bar';bars+=`<div class="pr-bar-wrap"><div class="pr-kg">${hasVal?kg:'–'}</div><div class="${bc}" style="height:${hPct}%"></div><div class="pr-wlbl">W${w+1}</div></div>`;}
  let pl='';WM_LABELS.forEach((f,i)=>{const cur=i===cW;const d4=weekDone(i);pl+=`<div class="prog-item${cur?' cur':''}"><div class="prog-num" style="${d4?'background:var(--green);border-color:var(--green);color:#000':''}">${d4?'✓':i+1}</div><div class="prog-inf"><strong>${f}</strong><span>${WM_RPE[i]}</span></div>${cur?'<div style="color:var(--green);font-size:20px">›</div>':''}</div>`;});
  document.getElementById('vFortschritt').innerHTML=hero+
    `<div class="lbl">Wochen-Fortschritt</div><div class="rings-grid">${rings}</div>
    <div class="lbl">Persönliche Rekorde</div><div class="pr-tabs">${tabs}</div>
    ${bestKg>0?`<div class="pr-best"><div class="pr-best-val">${bestKg} kg</div><div class="pr-best-lbl">🏆 PR – ${lift.label}</div></div>`:''}
    <div class="pr-chart"><div class="pr-bars">${bars}</div>
    <div class="pr-legend"><div class="pr-leg"><div class="pr-leg-dot" style="background:var(--green)"></div>PR</div><div class="pr-leg"><div class="pr-leg-dot" style="background:rgba(27,240,126,0.5)"></div>Eingetragen</div><div class="pr-leg"><div class="pr-leg-dot" style="background:var(--amber)"></div>Akt. Woche</div></div></div>
    <div class="lbl" style="margin-top:20px">Progression</div><div class="prog-list">${pl}</div>
    <div class="lbl" style="margin-top:20px">Ziele nach 6 Wochen</div>
    <div class="gc"><div class="gr"><span class="gl">Gewicht</span><span class="gv">−10 bis −12 kg</span></div><div class="gr"><span class="gl">Unterbauch</span><span class="gv">Sichtbar flacher</span></div><div class="gr"><span class="gl">Haltung</span><span class="gv">Becken neutral, Schultern zurück</span></div><div class="gr"><span class="gl">Kraft</span><span class="gv">Deutlich stärker</span></div><div class="gr"><span class="gl">Energie</span><span class="gv">Stabil, kein Nachmittags-Tief</span></div><div class="gr"><span class="gl">Cortisol</span><span class="gv">Messbar reduziert</span></div></div>
    <div style="height:20px"></div>`+renderMeasurements();
}

      <div class="scan-item-row"><span class="scan-item-name">Kalorien</span><span class="scan-item-val">${base.kcal} kcal/100g</span></div>

      <div><div class="field-label">Kohlenhydrate /100g</div><input class="field-input" type="number" id="manCarbs" placeholder="4" min="0" step="0.1" style="font-size:15px" oninput="calcManual()"/></div>

    h+=`</div>`;
    const totK=history.reduce((a,b)=>a+b.kcal,0);const totP=Math.round(history.reduce((a,b)=>a+b.protein,0)*10)/10;const totC=Math.round(history.reduce((a,b)=>a+b.carbs,0)*10)/10;const totF=Math.round(history.reduce((a,b)=>a+b.fat,0)*10)/10;

function saveApiKeyNow(){const k=document.getElementById('apiKeyInput').value.trim();if(!k.startsWith('sk-ant')){alert('Kein gültiger API Key.');return;}saveApiKey(k);renderScan();}

async function analyzeFreitext(){
  const key=getApiKey();if(!key)return;
  const input=document.getElementById('freitextInput');
  const text=input?input.value.trim():'';
  if(!text){alert('Bitte beschreibe was du gegessen hast.');return;}
  const btn=document.getElementById('freitextBtn');
  const resultEl=document.getElementById('freitextResult');
  if(btn){btn.className='freitext-send loading';btn.textContent='⏳';}
  if(resultEl)resultEl.innerHTML='<div style="font-size:12px;color:var(--text2);padding:8px 0">Wird analysiert...</div>';
  try{
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({
        model:'claude-sonnet-4-6',max_tokens:400,
        messages:[{role:'user',content:`Schätze die Nährwerte dieser Mahlzeit: "${text}"

Antworte NUR mit diesem JSON (keine Backticks, kein Text davor/danach):
{"name":"kurze Beschreibung","kcal":0,"protein":0,"carbs":0,"fat":0}

Alle Werte als Gesamtwerte der beschriebenen Mahlzeit (nicht pro 100g). Realistische Schätzung auf Basis von Durchschnittswerten.`}]
      })
    });
    if(!resp.ok){const err=await resp.json();throw new Error(err.error?.message||'Fehler '+resp.status);}
    const data=await resp.json();
    const raw=data.content.map(c=>c.text||'').join('');
    const clean=raw.replace(/```json|```/g,'').trim();
    const parsed=JSON.parse(clean);
    if(resultEl){
      resultEl.innerHTML=`<div class="freitext-result">
        <div class="freitext-result-name">${parsed.name}</div>
        <div class="freitext-macro-row">
          <div class="freitext-macro"><div class="freitext-macro-lbl">Kalorien</div><div class="freitext-macro-val" style="color:var(--amber)">${Math.round(parsed.kcal)}</div><div style="font-size:10px;color:var(--text3)">kcal</div></div>
          <div class="freitext-macro"><div class="freitext-macro-lbl">Protein</div><div class="freitext-macro-val" style="color:var(--green)">${Math.round(parsed.protein*10)/10}</div><div style="font-size:10px;color:var(--text3)">g</div></div>
          <div class="freitext-macro"><div class="freitext-macro-lbl">Kohlenhydrate</div><div class="freitext-macro-val" style="color:var(--blue)">${Math.round(parsed.carbs*10)/10}</div><div style="font-size:10px;color:var(--text3)">g</div></div>
          <div class="freitext-macro"><div class="freitext-macro-lbl">Fett</div><div class="freitext-macro-val" style="color:var(--purple)">${Math.round(parsed.fat*10)/10}</div><div style="font-size:10px;color:var(--text3)">g</div></div>
        </div>
        <div style="font-size:10px;color:var(--text3);margin-bottom:8px">Schätzung ±10% · Durchschnittswerte</div>
        <button class="add-to-day-btn" onclick="addFreitextToDay(${Math.round(parsed.kcal)},${Math.round(parsed.protein*10)/10},${Math.round(parsed.carbs*10)/10},${Math.round(parsed.fat*10)/10},'${parsed.name.replace(/'/g,"\'")}')">+ Zum Tagesprotokoll</button>
      </div>`;
    }
  }catch(e){
    if(resultEl)resultEl.innerHTML=`<div style="font-size:12px;color:var(--red);padding:8px 0">Fehler: ${e.message}</div>`;
  }
  if(btn){btn.className='freitext-send';btn.textContent='➤';}
}

function addFreitextToDay(kcal,protein,carbs,fat,name){
  const entry={name,kcal,protein,carbs,fat};
  const hist=loadScanHistory();hist.push(entry);saveScanHistory(hist);
  const m=loadMacros();
  m.kcal=Math.round((m.kcal||0)+kcal);
  m.protein=Math.round(((m.protein||0)+protein)*10)/10;
  m.carbs=Math.round(((m.carbs||0)+carbs)*10)/10;
  m.fat=Math.round(((m.fat||0)+fat)*10)/10;
  saveMacros(m);
  const inp=document.getElementById('freitextInput');if(inp)inp.value='';
  renderScan();
}


function calcManual(){const g=parseFloat(document.getElementById('manGrams').value)||0;const kcal=parseFloat(document.getElementById('manKcal').value)||0;const protein=parseFloat(document.getElementById('manProtein').value)||0;const carbs=parseFloat(document.getElementById('manCarbs').value)||0;const fat=parseFloat(document.getElementById('manFat').value)||0;const el=document.getElementById('manCalc');if(!el)return;if(g>0&&(kcal||protein||carbs||fat)){const f=g/100;el.style.display='block';el.innerHTML=`Bei <strong style="color:var(--text)">${g}g</strong>: <strong style="color:var(--amber)">${Math.round(kcal*f)} kcal</strong> · <strong style="color:var(--green)">${Math.round(protein*f*10)/10}g Protein</strong> · ${Math.round(carbs*f*10)/10}g KH · ${Math.round(fat*f*10)/10}g Fett`;}else{el.style.display='none';}}
function addManualToDay(){const name=document.getElementById('manName').value.trim()||'Mahlzeit';const g=parseFloat(document.getElementById('manGrams').value)||0;const kcal100=parseFloat(document.getElementById('manKcal').value)||0;const prot100=parseFloat(document.getElementById('manProtein').value)||0;const carbs100=parseFloat(document.getElementById('manCarbs').value)||0;const fat100=parseFloat(document.getElementById('manFat').value)||0;if(g<=0){alert('Bitte Menge eingeben.');return;}const f=g/100;const entry={name,grams:Math.round(g),kcal:Math.round(kcal100*f),protein:Math.round(prot100*f*10)/10,carbs:Math.round(carbs100*f*10)/10,fat:Math.round(fat100*f*10)/10};const hist=loadScanHistory();hist.push(entry);saveScanHistory(hist);const m=loadMacros();m.kcal=Math.round((m.kcal||0)+entry.kcal);m.protein=Math.round(((m.protein||0)+entry.protein)*10)/10;m.carbs=Math.round(((m.carbs||0)+entry.carbs)*10)/10;m.fat=Math.round(((m.fat||0)+entry.fat)*10)/10;saveMacros(m);['manName','manGrams','manKcal','manProtein','manCarbs','manFat'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});renderScan();}
function triggerScan(){document.getElementById('fileInput').click();}
function updatePortionCalc(){const el=document.getElementById('portionCalc');if(!el||!scanResult)return;const g=parseFloat(document.getElementById('portionGrams').value)||100;const f=g/100;const b=scanResult.per100;el.innerHTML=`Bei <strong style="color:var(--text)">${g}g</strong>: <strong style="color:var(--amber)">${Math.round(b.kcal*f)} kcal</strong> · <strong style="color:var(--green)">${Math.round(b.protein*f*10)/10}g Protein</strong> · ${Math.round(b.carbs*f*10)/10}g KH · ${Math.round(b.fat*f*10)/10}g Fett`;}
function addToDay(){if(!scanResult)return;const g=parseFloat(document.getElementById('portionGrams').value)||100;const f=g/100;const b=scanResult.per100;const entry={name:scanResult.name||'Lebensmittel',grams:Math.round(g),kcal:Math.round(b.kcal*f),protein:Math.round(b.protein*f*10)/10,carbs:Math.round(b.carbs*f*10)/10,fat:Math.round(b.fat*f*10)/10};const hist=loadScanHistory();hist.push(entry);saveScanHistory(hist);const m=loadMacros();m.kcal=Math.round((m.kcal||0)+entry.kcal);m.protein=Math.round(((m.protein||0)+entry.protein)*10)/10;m.carbs=Math.round(((m.carbs||0)+entry.carbs)*10)/10;m.fat=Math.round(((m.fat||0)+entry.fat)*10)/10;saveMacros(m);scanResult=null;renderScan();}
function removeFromHistory(i){const hist=loadScanHistory();const removed=hist.splice(i,1)[0];saveScanHistory(hist);const m=loadMacros();m.kcal=Math.max(0,Math.round((m.kcal||0)-removed.kcal));m.protein=Math.max(0,Math.round(((m.protein||0)-removed.protein)*10)/10);m.carbs=Math.max(0,Math.round(((m.carbs||0)-removed.carbs)*10)/10);m.fat=Math.max(0,Math.round(((m.fat||0)-removed.fat)*10)/10);saveMacros(m);renderScan();}
async function handleFileSelect(event){const file=event.target.files[0];if(!file)return;event.target.value='';const key=getApiKey();if(!key)return;const btn=document.getElementById('scanBtn');if(btn){btn.textContent='⏳ Wird analysiert...';btn.className='scan-btn loading';btn.disabled=true;}try{const b64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(',')[1]);r.onerror=()=>rej(new Error('Lesen fehlgeschlagen'));r.readAsDataURL(file);});const mime=file.type||'image/jpeg';const resp=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:500,messages:[{role:'user',content:[{type:'image',source:{type:'base64',media_type:mime,data:b64}},{type:'text',text:'Analysiere dieses Nährwertetikett. Antworte NUR mit JSON (keine Backticks): {"name":"Produktname","per100":{"kcal":0,"protein":0,"carbs":0,"fat":0}} Alle Werte pro 100g.'}]}]})});if(!resp.ok){const err=await resp.json();throw new Error(err.error?.message||'API Fehler '+resp.status);}const data=await resp.json();const text=data.content.map(c=>c.text||'').join('');const clean=text.replace(/```json|```/g,'').trim();scanResult=JSON.parse(clean);}catch(e){scanResult=null;const errBox=document.createElement('div');errBox.className='scan-error';errBox.innerHTML=`<strong>Fehler:</strong> ${e.message}`;const el=document.getElementById('vScan');if(el)el.insertBefore(errBox,el.firstChild);}renderScan();}

// ── GITHUB SYNC ───────────────────────────────────────────────────
let githubSHA=null;let syncTimeout=null;let syncStatus='idle';
function getGithubConfig(){return ld('tc_github',{token:'',owner:'',repo:''});}
function githubConfigured(){const c=getGithubConfig();return !!(c.token&&c.owner&&c.repo);}
function getAllData(){const data={};for(let i=0;i<localStorage.length;i++){const key=localStorage.key(i);if(key&&key.startsWith('tc_')&&key!=='tc_github'){try{data[key]=JSON.parse(localStorage.getItem(key));}catch(e){data[key]=localStorage.getItem(key);}}}return data;}
async function loadFromGithub(){if(!githubConfigured())return;const c=getGithubConfig();setSyncStatus('syncing');try{const resp=await fetch(`https://api.github.com/repos/${c.owner}/${c.repo}/contents/data.json`,{headers:{'Authorization':`token ${c.token}`,'Accept':'application/vnd.github.v3+json'}});if(resp.status===404){setSyncStatus('idle');return;}if(!resp.ok)throw new Error('Laden fehlgeschlagen: '+resp.status);const json=await resp.json();githubSHA=json.sha;const data=JSON.parse(decodeURIComponent(escape(atob(json.content.replace(/\n/g,'')))));Object.entries(data).forEach(([k,v])=>{localStorage.setItem(k,JSON.stringify(v));});setSyncStatus('saved');renderAll();}catch(e){console.error('GitHub load:',e);setSyncStatus('error',e.message);}}
async function saveToGithub(){if(!githubConfigured())return;const c=getGithubConfig();setSyncStatus('syncing');try{const data=getAllData();const content=btoa(unescape(encodeURIComponent(JSON.stringify(data,null,0))));const body={message:'Auto-save '+new Date().toISOString(),content,...(githubSHA?{sha:githubSHA}:{})};const resp=await fetch(`https://api.github.com/repos/${c.owner}/${c.repo}/contents/data.json`,{method:'PUT',headers:{'Authorization':`token ${c.token}`,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'},body:JSON.stringify(body)});if(!resp.ok){const err=await resp.json();throw new Error(err.message||'Speichern fehlgeschlagen');}const json=await resp.json();githubSHA=json.content.sha;sv('tc_last_sync',new Date().toISOString());setSyncStatus('saved');}catch(e){console.error('GitHub save:',e);setSyncStatus('error',e.message);}}
function scheduleSave(){if(!githubConfigured())return;clearTimeout(syncTimeout);setSyncStatus('pending');syncTimeout=setTimeout(saveToGithub,3000);}
function setSyncStatus(status,msg){syncStatus=status;const el=document.getElementById('syncIndicator');if(!el)return;if(!githubConfigured()){el.style.display='none';return;}el.style.display='flex';const cfg={idle:{icon:'☁️',label:'GitHub',color:'var(--text3)'},pending:{icon:'⏳',label:'...',color:'var(--amber)'},syncing:{icon:'⏳',label:'Syncing',color:'var(--amber)'},saved:{icon:'✓',label:'Gespeichert',color:'var(--green)'},error:{icon:'⚠️',label:msg||'Fehler',color:'var(--red)'}};const s=cfg[status]||cfg.idle;el.innerHTML=`<span style="color:${s.color};font-size:11px;font-weight:600">${s.icon} ${s.label}</span>`;}
function saveGithubConfig(){const token=document.getElementById('ghToken').value.trim();const owner=document.getElementById('ghOwner').value.trim();const repo=document.getElementById('ghRepo').value.trim();localStorage.setItem('tc_github',JSON.stringify({token,owner,repo}));githubSHA=null;renderProfil();if(token&&owner&&repo)loadFromGithub();}
function syncNow(){saveToGithub().then(()=>{if(cV==='Profil')renderProfil();});}

// ── RECOVERY CHECK ────────────────────────────────────────────────
function getTodayStr(){const d=new Date();return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;}
function recKey(){return `tc_rec_${getTodayStr()}`;}
function getRecovery(){return ld(recKey(),null);}
function saveRecovery(schlaf,stress,energie){sv(recKey(),{schlaf,stress,energie,ts:Date.now()});}

function calcAmpel(s){
  // Alle drei Werte: höher = besser (Körpergefühl und Mentale Frische = höher ist besser)
  const score=s.schlaf+s.stress+s.energie;
  if(score>=11)return{cls:'g',label:'Grün – Volle Intensität',sub:'Körper und Kopf bereit · Plan wie vorgesehen',rpe:'RPE wie geplant'};
  if(score>=7)return{cls:'y',label:'Gelb – Reduziert trainieren',sub:'Körper oder Kopf nicht optimal · RPE -1, 1 Satz weniger',rpe:'RPE -1 heute'};
  return{cls:'r',label:'Rot – Erholung priorisieren',sub:'Zu wenig Schlaf oder Körper zu schwer · Zone 2 oder Pause',rpe:'Pause oder Zone 2'};
}

function renderRecoveryCheck(){
  const rec=getRecovery();
  if(rec){
    const a=calcAmpel(rec);
    return `<div class="ampel ${a.cls}" style="margin-bottom:14px"><div class="ampel-dot"></div><div><div class="ampel-text">${a.label}</div><div class="ampel-sub">${a.sub}</div></div></div>`;
  }
  const metrics=[
    {id:'schlaf',label:'😴 Schlaf',desc:'Wie gut hast du heute Nacht geschlafen?',colors:['on-r','on-r','on-a','on-g','on-g']},
    {id:'stress',label:'🏋️ Körpergefühl',desc:'Wie leicht oder schwer fühlt sich dein Körper an?',colors:['on-r','on-r','on-a','on-g','on-g']},
    {id:'energie',label:'⚡ Mentale Frische',desc:'Wie klar und fokussiert ist dein Kopf?',colors:['on-r','on-r','on-a','on-g','on-g']},
  ];
  let h=`<div class="recovery-card"><div class="recovery-title">Check-in vor dem Training</div><div style="font-size:11px;color:var(--text3);margin-bottom:12px;line-height:1.6">Ausfüllen direkt bevor du trainierst – in der Umkleide oder auf dem Weg.</div>`;
  metrics.forEach(m=>{
    h+=`<div class="recovery-row"><div class="recovery-label">${m.label}</div><div class="recovery-btns" id="rec_${m.id}">`;
    for(let i=1;i<=5;i++){h+=`<button class="rec-btn" onclick="setRec('${m.id}',${i},this,'${m.colors[i-1]}')"> ${i}</button>`;}
    h+=`</div></div>`;
  });
  h+=`<button class="rec-save-btn" onclick="saveRecCheck()">Check-in speichern</button></div>`;
  return h;
}

let recVals={schlaf:0,stress:0,energie:0};
function setRec(field,val,btn,colorCls){
  recVals[field]=val;
  const container=document.getElementById('rec_'+field);
  if(container){container.querySelectorAll('.rec-btn').forEach(b=>{b.className='rec-btn';});btn.className='rec-btn '+colorCls;}
}
function saveRecCheck(){
  if(!recVals.schlaf||!recVals.stress||!recVals.energie){alert('Bitte alle drei bewerten.');return;}
  saveRecovery(recVals.schlaf,recVals.stress,recVals.energie);
  recVals={schlaf:0,stress:0,energie:0};
  renderAll();
}

// ── BREATHING EXERCISE ────────────────────────────────────────────
let breathTimer=null;let breathPhaseIdx=0;let breathCount=0;let breathRounds=0;let breathType='box';
const BREATH_TYPES={
  box:{label:'Box Breathing',phases:['Einatmen','Halten','Ausatmen','Halten'],times:[4,4,4,4],rounds:5,desc:'4-4-4-4 · 5 Runden · ~2 Min · Cortisol-Reset'},
  '478':{label:'4-7-8 Atmung',phases:['Einatmen','Halten','Ausatmen'],times:[4,7,8],rounds:4,desc:'4-7-8 · 4 Runden · ~3 Min · Entspannung tief'}
};

function renderBreathing(){
  const t=BREATH_TYPES[breathType];
  return `<div class="breath-card">
    <div class="breath-circle" id="breathCircle"><div><div class="breath-phase" id="breathPhase">Bereit</div><div class="breath-count" id="breathCount">–</div></div></div>
    <div class="breath-info" id="breathInfo">${t.desc}</div>
    <div class="breath-btns">
      <button class="breath-type-btn${breathType==='box'?' on':''}" onclick="setBreathType('box')">Box Breathing</button>
      <button class="breath-type-btn${breathType==='478'?' on':''}" onclick="setBreathType('478')">4-7-8</button>
    </div>
    <button class="breath-start-btn" id="breathStartBtn" onclick="startBreathing()">Starten</button>
    <button class="breath-stop-btn" onclick="stopBreathing()" style="display:none" id="breathStopBtn">Stopp</button>
  </div>`;
}

function setBreathType(t){breathType=t;stopBreathing();const el=document.getElementById('breathInfo');if(el)el.textContent=BREATH_TYPES[t].desc;document.querySelectorAll('.breath-type-btn').forEach((b,i)=>{b.className='breath-type-btn'+(Object.keys(BREATH_TYPES)[i]===t?' on':'');});}

function startBreathing(){
  clearInterval(breathTimer);
  const t=BREATH_TYPES[breathType];
  breathPhaseIdx=0;breathRounds=0;
  const startBtn=document.getElementById('breathStartBtn');const stopBtn=document.getElementById('breathStopBtn');
  if(startBtn)startBtn.style.display='none';if(stopBtn)stopBtn.style.display='block';
  runBreathPhase(t);
}

function runBreathPhase(t){
  const phase=t.phases[breathPhaseIdx];const duration=t.times[breathPhaseIdx];
  const circle=document.getElementById('breathCircle');const phaseEl=document.getElementById('breathPhase');const countEl=document.getElementById('breathCount');
  if(phaseEl)phaseEl.textContent=phase;
  if(circle){
    if(phase==='Einatmen'){circle.style.transform='scale(1.3)';circle.style.borderColor='#1BF07E';}
    else if(phase==='Ausatmen'){circle.style.transform='scale(0.85)';circle.style.borderColor='#4A9EF0';}
    else{circle.style.transform='scale(1.1)';circle.style.borderColor='#F0A030';}
  }
  let sec=duration;
  if(countEl)countEl.textContent=sec;
  breathTimer=setInterval(()=>{
    sec--;
    if(countEl)countEl.textContent=sec;
    if(sec<=0){
      clearInterval(breathTimer);
      breathPhaseIdx++;
      if(breathPhaseIdx>=t.phases.length){
        breathPhaseIdx=0;breathRounds++;
        if(breathRounds>=t.rounds){stopBreathing(true);return;}
      }
      runBreathPhase(t);
    }
  },1000);
}

function stopBreathing(done=false){
  clearInterval(breathTimer);breathPhaseIdx=0;breathRounds=0;
  const circle=document.getElementById('breathCircle');const phaseEl=document.getElementById('breathPhase');const countEl=document.getElementById('breathCount');
  const startBtn=document.getElementById('breathStartBtn');const stopBtn=document.getElementById('breathStopBtn');
  if(circle){circle.style.transform='scale(1)';circle.style.borderColor='var(--green)';}
  if(phaseEl)phaseEl.textContent=done?'Fertig ✓':'Bereit';
  if(countEl)countEl.textContent=done?'🧘':'–';
  if(startBtn)startBtn.style.display='block';if(stopBtn)stopBtn.style.display='none';
}

// ── BODY MEASUREMENTS ─────────────────────────────────────────────
function measKey(w){return `tc_meas_w${w}`;}
function getMeas(w){return ld(measKey(w),{weight:'',waist:''});}
function saveMeas(w,weight,waist){sv(measKey(w),{weight,waist});}

function renderMeasurements(){
  let h=`<div class="lbl" style="margin-top:20px">Körpermessungen</div><div class="measure-card">
    <div style="font-size:12px;color:var(--text2);margin-bottom:10px">Woche ${cW+1} – jetzt eintragen</div>
    <div class="measure-row">
      <div class="measure-inp-wrap"><div class="measure-lbl">Gewicht (kg)</div><input class="measure-inp" type="number" id="measWeight" value="${getMeas(cW).weight}" placeholder="84" step="0.1" oninput="autoSaveMeas()"/></div>
      <div class="measure-inp-wrap"><div class="measure-lbl">Bauchumfang (cm)</div><input class="measure-inp" type="number" id="measWaist" value="${getMeas(cW).waist}" placeholder="92" step="0.5" oninput="autoSaveMeas()"/></div>
    </div>
    <div class="measure-history">`;
  let hasData=false;
  for(let w=0;w<6;w++){
    const m=getMeas(w);
    if(!m.weight&&!m.waist)continue;
    hasData=true;
    const prevM=w>0?getMeas(w-1):{weight:'',waist:''};
    const wDelta=m.weight&&prevM.weight?Math.round((parseFloat(m.weight)-parseFloat(prevM.weight))*10)/10:null;
    const bDelta=m.waist&&prevM.waist?Math.round((parseFloat(m.waist)-parseFloat(prevM.waist))*10)/10:null;
    h+=`<div class="measure-hist-row"><span class="measure-hist-week">W${w+1}</span><div class="measure-hist-vals">`;
    if(m.weight)h+=`<span class="measure-hist-val">${m.weight} <span>kg</span>${wDelta!==null?`<span class="measure-delta ${wDelta<0?'neg':'pos'}">${wDelta>0?'+':''}${wDelta}</span>`:''}</span>`;
    if(m.waist)h+=`<span class="measure-hist-val">${m.waist} <span>cm</span>${bDelta!==null?`<span class="measure-delta ${bDelta<0?'neg':'pos'}">${bDelta>0?'+':''}${bDelta}</span>`:''}</span>`;
    h+=`</div></div>`;
  }
  if(!hasData)h+=`<div style="font-size:12px;color:var(--text3);padding:8px 0">Noch keine Daten – trag oben deine Werte ein</div>`;
  h+=`</div></div>`;
  return h;
}

function autoSaveMeas(){
  const w=document.getElementById('measWeight');const b=document.getElementById('measWaist');
  saveMeas(cW,w?w.value:'',b?b.value:'');
}

// ── POST-WORKOUT RATING ───────────────────────────────────────────
function ratingKey(){return `tc_rating_w${cW}_d${cD}`;}
function getRating(){return ld(ratingKey(),null);}
function saveRatingNow(){
  const e=parseInt(document.getElementById('rE')?.value||0);
  const k=parseInt(document.getElementById('rK')?.value||0);
  const r=parseInt(document.getElementById('rR')?.value||0);
  if(!e||!k||!r){alert('Bitte alle drei bewerten.');return;}
  sv(ratingKey(),{energie:e,kraft:k,recovery:r,ts:Date.now()});
  const card=document.getElementById('ratingCard');
  if(card){card.innerHTML=`<div style="font-size:13px;color:var(--green);font-weight:600">✓ Bewertung gespeichert · E:${e} K:${k} R:${r}</div>`;}
}

function renderRating(){
  const saved=getRating();
  if(saved)return `<div class="rating-card"><div class="rating-title">Einheit bewertet</div><div style="font-size:13px;color:var(--text2)">Energie: ${saved.energie}/5 · Kraft: ${saved.kraft}/5 · Erholung: ${saved.recovery}/5</div></div>`;
  const rows=[{id:'rE',label:'⚡ Energie'},{ id:'rK',label:'💪 Kraft'},{ id:'rR',label:'😴 Erholung danach'}];
  let h=`<div class="rating-card" id="ratingCard"><div class="rating-title">Einheit bewerten</div>`;
  rows.forEach(row=>{
    h+=`<div style="margin-bottom:10px"><div style="font-size:12px;color:var(--text2);margin-bottom:5px">${row.label}</div>
    <div class="rating-stars"><input type="range" id="${row.id}" min="1" max="5" value="3" step="1" style="width:100%"/></div></div>`;
  });
  h+=`<button class="rating-save-btn" onclick="saveRatingNow()">Bewertung speichern</button></div>`;
  return h;
}
