<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black"/>
<meta name="apple-mobile-web-app-title" content="Training"/>
<meta name="theme-color" content="#0E0E0C"/>
<title>Training Tracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#0E0E0C;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;color:#F0EDE8}
:root{
  --bg:#0E0E0C;--s1:#161614;--s2:#1E1E1B;--s3:#262622;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#F0EDE8;--text2:#8A8880;--text3:#4A4845;
  --green:#1BF07E;--gdim:#0DB859;--gbg:rgba(27,240,126,0.10);
  --amber:#F0A030;--abg:rgba(240,160,48,0.10);
  --purple:#9B8FFF;--pbg:rgba(155,143,255,0.10);
  --blue:#4A9EF0;--bbg:rgba(74,158,240,0.10);
  --red:#FF5A5A;--rbg:rgba(255,90,90,0.10);
  --radius:16px;--rsm:12px;--rxs:8px;
}
.app{max-width:430px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
.header{background:var(--bg);border-bottom:1px solid var(--border);padding:env(safe-area-inset-top,20px) 20px 0;position:sticky;top:0;z-index:50}
.header-top{display:flex;align-items:center;justify-content:space-between;padding:14px 0 12px}
.app-title{font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--text3)}
.week-pill{background:var(--gbg);color:var(--green);font-size:12px;font-weight:700;padding:5px 12px;border-radius:20px;border:1px solid rgba(27,240,126,0.2)}
.week-row{display:flex;align-items:center;justify-content:space-between;padding-bottom:12px}
.week-nav{display:flex;align-items:center;gap:8px}
.nav-btn{width:32px;height:32px;border-radius:var(--rxs);border:1px solid var(--border2);background:var(--s2);cursor:pointer;color:var(--text2);font-size:18px;display:flex;align-items:center;justify-content:center}
.nav-btn:active{background:var(--s3)}
.week-name{font-size:22px;font-weight:700;color:var(--text);min-width:80px;text-align:center;letter-spacing:-.5px}
.prog-wrap{padding-bottom:12px}
.prog-track{height:3px;background:var(--s3);border-radius:2px}
.prog-fill{height:3px;background:var(--green);border-radius:2px;transition:width .5s ease}
.prog-row{display:flex;justify-content:space-between;margin-top:6px}
.prog-pct{font-size:11px;font-weight:700;color:var(--green)}
.prog-lbl{font-size:11px;color:var(--text3)}
.day-tabs{display:flex;gap:5px;padding:10px 20px 12px;overflow-x:auto;background:var(--bg)}
.day-tabs::-webkit-scrollbar{display:none}
.day-btn{flex-shrink:0;padding:8px 13px;border-radius:20px;border:1px solid var(--border2);background:transparent;font-size:13px;font-weight:600;color:var(--text2);cursor:pointer;transition:all .2s}
.day-btn.active{background:var(--green);border-color:var(--green);color:#000}
.day-btn.done{border-color:var(--gdim);color:var(--gdim)}
.day-btn.sa.active{background:var(--green);border-color:var(--green);color:#000}
.day-btn.so.active{background:var(--purple);border-color:var(--purple);color:#000}
.day-btn.so.done{border-color:var(--purple);color:var(--purple)}
.day-btn.fr{color:var(--text3);border-color:var(--border)}
.scroll{flex:1;overflow-y:auto;padding:20px 20px 100px}
.lbl{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin:0 0 10px}
.day-hdr{background:var(--s1);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.day-title{font-size:18px;font-weight:700;color:var(--text);letter-spacing:-.3px}
.day-meta{font-size:12px;color:var(--text2);margin-top:4px}
.day-ct{font-size:28px;font-weight:700;color:var(--green);letter-spacing:-1px}
.day-ct span{font-size:14px;font-weight:500;color:var(--text3)}
.ex-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:8px}
.ex-card.dn{border-color:rgba(27,240,126,0.3);background:rgba(27,240,126,0.05)}
.ex-row{display:flex;align-items:center;gap:12px}
.chk{width:28px;height:28px;border-radius:50%;border:2px solid var(--border2);background:transparent;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s}
.chk.on{background:var(--green);border-color:var(--green)}
.chk.pur.on{background:var(--purple);border-color:var(--purple)}
.chk svg{display:none;width:14px;height:14px}.chk.on svg{display:block}
.ex-name{flex:1;font-size:14px;font-weight:600;color:var(--text)}
.ex-card.dn .ex-name{color:var(--text3);text-decoration:line-through}
.ex-s{font-size:12px;color:var(--text2);white-space:nowrap;background:var(--s3);padding:3px 8px;border-radius:6px}
.w-row{display:flex;align-items:center;gap:8px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.w-row label{font-size:11px;color:var(--text3);font-weight:600;letter-spacing:.05em;text-transform:uppercase}
.w-inp{width:72px;height:32px;border:1px solid var(--border2);border-radius:var(--rxs);background:var(--s3);color:var(--text);font-size:15px;font-weight:700;padding:0 8px;text-align:center}
.ex-note{font-size:12px;color:var(--text2);margin-top:10px;padding-top:10px;border-top:1px solid var(--border);line-height:1.6}
.cond-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:8px}
.cond-card.am{border-color:rgba(240,160,48,0.2);background:var(--abg)}
.cbadge{display:inline-flex;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;letter-spacing:.05em;margin-bottom:10px}
.cbadge.g{background:var(--gbg);color:var(--green)}
.cbadge.a{background:rgba(240,160,48,0.15);color:var(--amber)}
.cbadge.p{background:var(--pbg);color:var(--purple)}
.ci{font-size:13px;color:var(--text2);padding:4px 0;display:flex;align-items:center;gap:8px}
.dot{width:4px;height:4px;border-radius:50%;flex-shrink:0}
.dot.g{background:var(--green)}.dot.a{background:var(--amber)}.dot.p{background:var(--purple)}
.csub{font-size:11px;color:var(--text3);margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}
.cnd-btn{width:100%;padding:14px;border-radius:var(--rsm);border:1px solid var(--border2);background:transparent;color:var(--text2);font-size:14px;font-weight:600;cursor:pointer;margin-top:10px;transition:all .2s}
.cnd-btn.on{background:var(--green);border-color:var(--green);color:#000}
.cnd-btn.pur{border-color:rgba(155,143,255,0.3);color:var(--purple)}
.cnd-btn.pur.on{background:var(--purple);border-color:var(--purple);color:#000}
.fin-card{background:var(--bbg);border:1px solid rgba(74,158,240,0.2);border-radius:var(--radius);padding:12px 16px;margin-bottom:8px}
.fin-b{display:inline-block;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;background:rgba(74,158,240,0.15);color:var(--blue);margin-bottom:8px}
.banner{border-radius:var(--radius);padding:14px 16px;margin-bottom:14px;display:flex;align-items:center;gap:12px}
.banner.g{background:var(--gbg);border:1px solid rgba(27,240,126,0.25)}
.banner.p{background:var(--pbg);border:1px solid rgba(155,143,255,0.25)}
.banner .bi{font-size:28px}.banner p{font-size:14px;font-weight:700}
.banner.g p{color:var(--green)}.banner.p p{color:var(--purple)}
.rest-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--radius);padding:32px 20px;text-align:center;margin-bottom:12px}
.rest-icon{font-size:48px;margin-bottom:14px}
.rest-title{font-size:20px;font-weight:700;color:var(--text);margin-bottom:8px}
.rest-text{font-size:14px;color:var(--text2);line-height:1.7}
.rest-q{margin-top:20px;padding:12px 16px;background:var(--s2);border-radius:var(--rsm);border-left:2px solid var(--green);font-size:12px;color:var(--text2);text-align:left;line-height:1.6;font-style:italic}
.z2c{background:var(--s1);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:all .2s}
.z2c.sel{border-color:rgba(27,240,126,0.35);background:var(--gbg)}
.z2i{font-size:28px;flex-shrink:0}.z2n{font-size:15px;font-weight:700;color:var(--text)}
.z2d{font-size:12px;color:var(--text2);margin-top:2px}.z2t{font-size:11px;font-weight:700;color:var(--green);margin-top:4px}
.z2k{width:24px;height:24px;border-radius:50%;border:2px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s}
.z2c.sel .z2k{background:var(--green);border-color:var(--green)}
.z2k svg{display:none;width:13px;height:13px}.z2c.sel .z2k svg{display:block}
.ib{border-radius:var(--rsm);padding:14px 16px;margin-bottom:8px}
.ib.g{background:var(--gbg);border:1px solid rgba(27,240,126,0.15)}
.ib.p{background:var(--pbg);border:1px solid rgba(155,143,255,0.15)}
.ib-t{font-size:12px;font-weight:700;margin-bottom:5px;letter-spacing:.04em}
.ib.g .ib-t{color:var(--green)}.ib.p .ib-t{color:var(--purple)}
.ib-tx{font-size:12px;line-height:1.7;color:var(--text2)}
.mob-hdr{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.mob-num{width:22px;height:22px;border-radius:50%;background:var(--pbg);border:1px solid rgba(155,143,255,0.3);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--purple);flex-shrink:0}
.mob-tit{font-size:12px;font-weight:700;color:var(--purple);letter-spacing:.05em;text-transform:uppercase}
/* NUTRITION */
.macro-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.macro-box{background:var(--s1);border:1px solid var(--border);border-radius:var(--rsm);padding:12px}
.macro-box.full-w{grid-column:1/-1}
.macro-label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:6px}
.macro-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.macro-consumed{font-size:22px;font-weight:800;color:var(--text);letter-spacing:-0.5px}
.macro-target{font-size:13px;color:var(--text3)}
.macro-bar{height:4px;background:var(--s3);border-radius:2px}
.macro-bar-fill{height:4px;border-radius:2px;transition:width .3s}
.macro-inp{width:100%;height:34px;border:1px solid var(--border2);border-radius:var(--rxs);background:var(--s3);color:var(--text);font-size:15px;font-weight:700;padding:0 10px;text-align:center;margin-top:8px}
.nutr-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:12px}
.nutr-row{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:1px solid var(--border)}
.nutr-row:last-child{border-bottom:none}
.nchk{width:26px;height:26px;border-radius:var(--rxs);border:2px solid var(--border2);background:transparent;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s}
.nchk.on{background:var(--green);border-color:var(--green)}
.nchk svg{display:none;width:14px;height:14px}.nchk.on svg{display:block}
.nlbl{flex:1;font-size:14px;color:var(--text);font-weight:500}
.nlbl.dn{color:var(--text3);text-decoration:line-through}
.no-profile-box{background:var(--s1);border:1px solid rgba(240,160,48,0.3);border-radius:var(--radius);padding:18px;margin-bottom:14px;text-align:center}
.no-profile-box p{font-size:14px;color:var(--text2);margin-bottom:12px;line-height:1.6}
.go-profile-btn{background:var(--amber);color:#000;border:none;border-radius:var(--rsm);padding:10px 20px;font-size:13px;font-weight:700;cursor:pointer}
/* PROFIL */
.profile-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.profile-field{margin-bottom:16px}
.profile-field:last-child{margin-bottom:0}
.field-label{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:8px}
.field-input{width:100%;height:44px;border:1px solid var(--border2);border-radius:var(--rsm);background:var(--s3);color:var(--text);font-size:17px;font-weight:600;padding:0 14px}
.gender-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.gender-btn{padding:12px;border-radius:var(--rsm);border:1px solid var(--border2);background:transparent;font-size:15px;font-weight:600;color:var(--text2);cursor:pointer;text-align:center;transition:all .2s}
.gender-btn.on{background:var(--green);border-color:var(--green);color:#000}
.goal-row{display:flex;flex-direction:column;gap:8px}
.goal-btn{padding:12px 16px;border-radius:var(--rsm);border:1px solid var(--border2);background:transparent;font-size:14px;font-weight:600;color:var(--text2);cursor:pointer;text-align:left;transition:all .2s;display:flex;justify-content:space-between;align-items:center}
.goal-btn .gs{font-size:11px;font-weight:500;color:var(--text3);margin-top:2px}
.goal-btn.on{border-color:var(--green);color:var(--text)}
.goal-btn.on .gs{color:var(--green)}
.save-btn{width:100%;padding:16px;border-radius:var(--rsm);background:var(--green);border:none;color:#000;font-size:16px;font-weight:700;cursor:pointer;margin-top:4px;letter-spacing:.02em}
.targets-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.target-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}
.target-row:last-child{border-bottom:none}
.target-label{font-size:14px;color:var(--text2);display:flex;align-items:center;gap:8px}
.target-icon{font-size:18px}
.target-vals{text-align:right}
.target-main{font-size:16px;font-weight:700;color:var(--text)}
.target-sub{font-size:11px;color:var(--text3);margin-top:1px}
.day-type-badge{display:inline-flex;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;margin-bottom:14px}
.day-type-badge.intense{background:var(--rbg);color:var(--red)}
.day-type-badge.moderate{background:var(--abg);color:var(--amber)}
.day-type-badge.easy{background:var(--gbg);color:var(--green)}
/* FORTSCHRITT */
.hero-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px}
.hero-box{background:var(--s1);border:1px solid var(--border);border-radius:var(--radius);padding:16px;display:flex;flex-direction:column;align-items:center;text-align:center}
.hero-icon{font-size:32px;margin-bottom:6px}
.hero-num{font-size:36px;font-weight:800;letter-spacing:-1.5px;line-height:1}
.hero-num.g{color:var(--green)}.hero-num.a{color:var(--amber)}
.hero-sub{font-size:12px;color:var(--text2);margin-top:4px;font-weight:500}
.rings-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;margin-bottom:20px}
.ring-wrap{display:flex;flex-direction:column;align-items:center;gap:5px}
.ring-lbl{font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--text3)}
.pr-tabs{display:flex;gap:6px;margin-bottom:14px}
.pr-tab{flex:1;padding:9px 6px;border-radius:var(--rsm);border:1px solid var(--border2);background:transparent;font-size:12px;font-weight:700;color:var(--text2);cursor:pointer;text-align:center;transition:all .2s}
.pr-tab.on{background:var(--green);border-color:var(--green);color:#000}
.pr-chart{background:var(--s1);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:8px}
.pr-bars{display:flex;align-items:flex-end;gap:6px;height:90px;margin-bottom:8px}
.pr-bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.pr-bar{width:100%;border-radius:5px 5px 0 0;min-height:4px;background:var(--s3)}
.pr-bar.has{background:var(--green);opacity:.7}
.pr-bar.pr{background:var(--green);opacity:1}
.pr-bar.cur{background:var(--amber)}
.pr-wlbl{font-size:9px;color:var(--text3);font-weight:600}
.pr-kg{font-size:10px;font-weight:700;color:var(--text3)}
.pr-bar.has ~ .pr-kg,.pr-bar.pr ~ .pr-kg{color:var(--green)}
.pr-bar.cur ~ .pr-kg{color:var(--amber)}
.pr-legend{display:flex;align-items:center;justify-content:center;gap:14px}
.pr-leg{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2)}
.pr-leg-dot{width:8px;height:8px;border-radius:50%}
.pr-best{text-align:center;padding:12px;background:var(--gbg);border-radius:var(--rsm);border:1px solid rgba(27,240,126,0.2);margin-bottom:8px}
.pr-best-val{font-size:28px;font-weight:800;color:var(--green);letter-spacing:-1px}
.pr-best-lbl{font-size:11px;color:var(--text2);margin-top:2px}
.prog-list{background:var(--s1);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:16px}
.prog-item{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--border)}
.prog-item:last-child{border-bottom:none}
.prog-num{width:28px;height:28px;border-radius:50%;border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--text3);flex-shrink:0}
.prog-item.cur .prog-num{background:var(--green);border-color:var(--green);color:#000}
.prog-inf{flex:1}
.prog-inf strong{font-size:14px;font-weight:700;color:var(--text2)}
.prog-item.cur .prog-inf strong{color:var(--text)}
.prog-inf span{display:block;font-size:11px;color:var(--text3);margin-top:2px}
.gc{background:var(--s1);border:1px solid var(--border);border-radius:var(--radius);padding:4px 0;margin-bottom:12px;overflow:hidden}
.gr{display:flex;gap:12px;padding:10px 16px;border-bottom:1px solid var(--border);font-size:13px}
.gr:last-child{border-bottom:none}
.gl{color:var(--text3);width:90px;flex-shrink:0;font-size:12px;font-weight:600;letter-spacing:.04em;text-transform:uppercase}
.gv{color:var(--text);font-weight:600}
.nav-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--s1);border-top:1px solid var(--border);display:flex;padding:10px 0;padding-bottom:max(10px,env(safe-area-inset-bottom));z-index:100}
.navi{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;border:none;background:none;cursor:pointer;padding:2px 4px}
.navi .ni{font-size:20px;color:var(--text3)}.navi .nl{font-size:9px;color:var(--text3);font-weight:600;letter-spacing:.04em}
.navi.active .ni,.navi.active .nl{color:var(--green)}
.view{display:none}.view.show{display:block}
/* SCANNER */
.scan-btn{width:100%;padding:16px;border-radius:var(--rsm);background:var(--green);border:none;color:#000;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:12px;letter-spacing:.02em}
.scan-btn:active{transform:scale(.98)}
.scan-btn.loading{background:var(--s3);color:var(--text2)}
.scan-result{background:var(--s1);border:1px solid rgba(27,240,126,0.3);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.scan-result-title{font-size:13px;font-weight:700;color:var(--green);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.scan-item-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border)}
.scan-item-row:last-child{border-bottom:none}
.scan-item-name{font-size:13px;color:var(--text2)}
.scan-item-val{font-size:14px;font-weight:700;color:var(--text)}
.portion-row{display:flex;align-items:center;gap:10px;margin:12px 0}
.portion-row label{font-size:13px;color:var(--text2);flex:1}
.portion-inp{width:80px;height:36px;border:1px solid var(--border2);border-radius:var(--rxs);background:var(--s3);color:var(--text);font-size:16px;font-weight:700;padding:0 10px;text-align:center}
.add-to-day-btn{width:100%;padding:13px;border-radius:var(--rsm);background:var(--green);border:none;color:#000;font-size:14px;font-weight:700;cursor:pointer;margin-top:4px}

function loadProfile(){return ld('tc_profile',{gender:'M',age:0,height:0,weight:0,goal:'fat'});}
function saveProfile(p){sv('tc_profile',p);}
function loadMacros(){return ld(macroKey(),{kcal:0,protein:0,carbs:0,fat:0});}
function saveMacros(m){sv(macroKey(),m);}

function calcTargets(){
  const p=loadProfile();
  if(!p.weight||!p.height||!p.age)return null;
  // Mifflin-St Jeor BMR
  const bmr=p.gender==='M'
    ?10*p.weight+6.25*p.height-5*p.age+5
    :10*p.weight+6.25*p.height-5*p.age-161;
  const dt=getDayType();
  const factor=ACT_FACTORS[dt]||1.4;
  const tdee=Math.round(bmr*factor);
  // Goal deficit
  const isTraining=!['rest','mobility'].includes(dt);
  let deficit=0;
  if(p.goal==='fat')deficit=isTraining?-200:-400;
  else if(p.goal==='recomp')deficit=isTraining?-100:-250;
  else deficit=200; // muscle
  const kcal=Math.round(tdee+deficit);
  // Protein
  const protFactor=p.goal==='fat'?(isTraining?2.2:2.0):2.0;
  const protein=Math.round(p.weight*protFactor);
  // Fat min
  const fat=Math.round(p.weight*0.9);
  // Carbs from remaining kcal
  const remaining=kcal-protein*4-fat*9;
  const carbs=Math.max(Math.round(remaining/4),50);
  return{kcal,protein,carbs,fat,tdee,bmr:Math.round(bmr)};
}

  if(v==='Ernährung')renderNutr();
  if(v==='Profil')renderProfil();
  if(v==='Scan')renderScan();
}

function dayDone(w,d){
  if(d===4)return false;
  if(d===5)return Z2.some(o=>ld(`tc_z2_w${w}_${o.id}`,false));
  if(d===6){let a=true;MOB.forEach(b=>b.exs.forEach(e=>{if(!ld(`tc_mob_w${w}_${e.id}`,false))a=false;}));return a;}
  const day=PLAN[w].days[d];
  for(const ex of day.ex)if(!ld(`tc_w${w}_d${d}_ex_${ex.id}`,false))return false;
  return ld(`tc_w${w}_d${d}_cond`,false);
}
function weekDone(w){return[0,1,2,3].every(d=>dayDone(w,d));}
function totalDone(){let n=0;for(let w=0;w<6;w++)for(let d=0;d<4;d++)if(dayDone(w,d))n++;return n;}
function weekPct(w){let n=0;for(let d=0;d<4;d++)if(dayDone(w,d))n++;return Math.round(n/4*100);}
function calcStreak(){let s=0;for(let w=0;w<6;w++){if(weekDone(w))s=w+1;else break;}return s;}

// ── GITHUB SYNC ───────────────────────────────────────────────────
let githubSHA=null;
let syncTimeout=null;
let syncStatus='idle';

function getGithubConfig(){return ld('tc_github',{token:'',owner:'',repo:''});}

function githubConfigured(){const c=getGithubConfig();return !!(c.token&&c.owner&&c.repo);}

function getAllData(){
  const data={};
  for(let i=0;i<localStorage.length;i++){
    const key=localStorage.key(i);
    if(key&&key.startsWith('tc_')&&key!=='tc_github'){
      try{data[key]=JSON.parse(localStorage.getItem(key));}catch(e){data[key]=localStorage.getItem(key);}
    }
  }
  return data;
}

async function loadFromGithub(){
  if(!githubConfigured())return;
  const c=getGithubConfig();
  setSyncStatus('syncing');
  try{
    const resp=await fetch(`https://api.github.com/repos/${c.owner}/${c.repo}/contents/data.json`,{
      headers:{'Authorization':`token ${c.token}`,'Accept':'application/vnd.github.v3+json'}
    });
    if(resp.status===404){setSyncStatus('idle');return;}
    if(!resp.ok)throw new Error('Laden fehlgeschlagen: '+resp.status);
    const json=await resp.json();
    githubSHA=json.sha;
    const data=JSON.parse(decodeURIComponent(escape(atob(json.content.replace(/\n/g,'')))));
    Object.entries(data).forEach(([k,v])=>{localStorage.setItem(k,JSON.stringify(v));});
    setSyncStatus('saved');
    renderAll();
  }catch(e){
    console.error('GitHub load:',e);
    setSyncStatus('error',e.message);
  }
}

async function saveToGithub(){
  if(!githubConfigured())return;
  const c=getGithubConfig();
  setSyncStatus('syncing');
  try{
    const data=getAllData();
    const content=btoa(unescape(encodeURIComponent(JSON.stringify(data,null,0))));
    const body={message:'Auto-save '+new Date().toISOString(),content,...(githubSHA?{sha:githubSHA}:{})};
    const resp=await fetch(`https://api.github.com/repos/${c.owner}/${c.repo}/contents/data.json`,{
      method:'PUT',
      headers:{'Authorization':`token ${c.token}`,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'},
      body:JSON.stringify(body)
    });
    if(!resp.ok){const err=await resp.json();throw new Error(err.message||'Speichern fehlgeschlagen');}
    const json=await resp.json();
    githubSHA=json.content.sha;
    sv('tc_last_sync',new Date().toISOString());
    setSyncStatus('saved');
  }catch(e){
    console.error('GitHub save:',e);
    setSyncStatus('error',e.message);
  }
}

function scheduleSave(){
  if(!githubConfigured())return;
  clearTimeout(syncTimeout);
  setSyncStatus('pending');
  syncTimeout=setTimeout(saveToGithub,3000);
}

function setSyncStatus(status,msg){
  syncStatus=status;
  const el=document.getElementById('syncIndicator');
  if(!el)return;
  if(!githubConfigured()){el.style.display='none';return;}
  el.style.display='flex';
  const cfg={
    idle:{icon:'☁️',label:'GitHub',color:'var(--text3)'},
    pending:{icon:'⏳',label:'Speichert...',color:'var(--amber)'},
    syncing:{icon:'⏳',label:'Syncing...',color:'var(--amber)'},
    saved:{icon:'✓',label:'Gespeichert',color:'var(--green)'},
    error:{icon:'⚠️',label:msg||'Fehler',color:'var(--red)'}
  };
  const s=cfg[status]||cfg.idle;
  el.innerHTML=`<span style="color:${s.color};font-size:11px;font-weight:600">${s.icon} ${s.label}</span>`;
}

function saveGithubConfig(){
  const token=document.getElementById('ghToken').value.trim();
  const owner=document.getElementById('ghOwner').value.trim();
  const repo=document.getElementById('ghRepo').value.trim();
  sv('tc_github',{token,owner,repo});
  githubSHA=null;
  renderProfil();
  if(token&&owner&&repo)loadFromGithub();
}

function syncNow(){saveToGithub().then(()=>{if(cV==='Profil')renderProfil();});}

function renderRing(w){
  const pct=weekPct(w);const cur=w===cW;const full=pct===100;
  const r=20;const circ=2*Math.PI*r;const offset=circ*(1-pct/100);
  const color=full?'#1BF07E':cur?'#F0A030':'#4A9EF0';
  const textColor=full?'#1BF07E':cur?'#F0A030':'#8A8880';
  return `<div class="ring-wrap"><svg width="48" height="48" viewBox="0 0 48 48">
    <circle cx="24" cy="24" r="${r}" fill="none" stroke="#1E1E1B" stroke-width="5"/>
    <circle cx="24" cy="24" r="${r}" fill="none" stroke="${color}" stroke-width="5" stroke-dasharray="${circ.toFixed(1)}" stroke-dashoffset="${offset.toFixed(1)}" stroke-linecap="round" transform="rotate(-90 24 24)"/>
    <text x="24" y="28" text-anchor="middle" fill="${textColor}" font-size="11" font-weight="800" font-family="-apple-system,sans-serif">${w+1}</text>
  </svg><div class="ring-lbl" style="color:${textColor}">${pct}%</div></div>`;
}

function renderPRChart(){
  const lift=PR_LIFTS[cPR];
  const allKgs=Array(6).fill(0);
  lift.entries.forEach(e=>{allKgs[e.w]=parseFloat(ld(e.k,''))||0;});
  const maxKg=Math.max(...allKgs,1);const bestKg=Math.max(...allKgs);
  let tabs='';PR_LIFTS.forEach((l,i)=>{tabs+=`<button class="pr-tab${i===cPR?' on':''}" onclick="setPR(${i})">${l.label}</button>`;});
  let bars='';
  for(let w=0;w<6;w++){
    const kg=allKgs[w];const hasVal=kg>0;
    const isPR=hasVal&&kg===bestKg;const isCur=w===cW;
    const hPct=hasVal?Math.max(Math.round(kg/maxKg*100),8):6;
    const bc=isPR?'pr-bar pr':hasVal?(isCur?'pr-bar cur':'pr-bar has'):'pr-bar';
    bars+=`<div class="pr-bar-wrap"><div class="pr-kg">${hasVal?kg:'–'}</div><div class="${bc}" style="height:${hPct}%"></div><div class="pr-wlbl">W${w+1}</div></div>`;
  }
  return `<div class="lbl" style="margin-top:20px">Persönliche Rekorde</div>
  <div class="pr-tabs">${tabs}</div>
  ${bestKg>0?`<div class="pr-best"><div class="pr-best-val">${bestKg} kg</div><div class="pr-best-lbl">🏆 Persönlicher Rekord – ${lift.label}</div></div>`:''}
  <div class="pr-chart"><div class="pr-bars">${bars}</div>
  <div class="pr-legend"><div class="pr-leg"><div class="pr-leg-dot" style="background:var(--green)"></div>PR</div><div class="pr-leg"><div class="pr-leg-dot" style="background:rgba(27,240,126,0.5)"></div>Eingetragen</div><div class="pr-leg"><div class="pr-leg-dot" style="background:var(--amber)"></div>Akt. Woche</div></div></div>`;
}

function renderFortschritt(){
  const done=totalDone();const streak=calcStreak();
  const hero=`<div class="hero-row"><div class="hero-box"><div class="hero-icon">🔥</div><div class="hero-num a">${streak}</div><div class="hero-sub">${streak===1?'Woche in Folge':'Wochen in Folge'}</div></div><div class="hero-box"><div class="hero-icon">✅</div><div class="hero-num g">${done}</div><div class="hero-sub">Einheiten geschafft</div></div></div>`;
  let rings='';for(let w=0;w<6;w++)rings+=renderRing(w);
  let pl='';
  WM.forEach((w,i)=>{const cur=i===cW;const d4=weekDone(i);pl+=`<div class="prog-item${cur?' cur':''}"><div class="prog-num" style="${d4?'background:var(--green);border-color:var(--green);color:#000':''}">${d4?'✓':i+1}</div><div class="prog-inf"><strong>${w.f}</strong><span>${w.r}</span></div>${cur?'<div style="color:var(--green);font-size:20px">›</div>':''}</div>`;});
  document.getElementById('vFortschritt').innerHTML=
    hero+`<div class="lbl">Wochen-Fortschritt</div><div class="rings-grid">${rings}</div>`+
    renderPRChart()+
    `<div class="lbl" style="margin-top:20px">Progression</div><div class="prog-list">${pl}</div>
    <div class="lbl" style="margin-top:20px">Ziele nach 6 Wochen</div>
    <div class="gc">
      <div class="gr"><span class="gl">Gewicht</span><span class="gv">−3 bis −5 kg</span></div>
      <div class="gr"><span class="gl">Bauch</span><span class="gv">Sichtbar flacher</span></div>
      <div class="gr"><span class="gl">Kraft</span><span class="gv">Deutlich zurück</span></div>
      <div class="gr"><span class="gl">Energie</span><span class="gv">Stabil & hoch</span></div>
      <div class="gr"><span class="gl">Haltung</span><span class="gv">Aufrechter</span></div>
      <div class="gr"><span class="gl">Mobility</span><span class="gv">Hüfte & T-Spine</span></div>
    </div><div style="height:20px"></div>`;
}

// ── SCANNER ──────────────────────────────────────────────────────
let scanResult=null;

function getApiKey(){return ld('tc_apikey','');}
function saveApiKey(k){sv('tc_apikey',k);}
function scanHistKey(){return`tc_scan_w${cW}_d${cD}`;}
function loadScanHistory(){return ld(scanHistKey(),[]);}
function saveScanHistory(h){sv(scanHistKey(),h);}

function renderScan(){
  const key=getApiKey();
  const history=loadScanHistory();
  let h='';

  if(!key){
    h+=`<div class="api-setup">
      <div class="api-setup-title">🔑 API Key einrichten</div>
      <div class="api-setup-text">Einmalig deinen Anthropic API Key eingeben – wird sicher lokal gespeichert.</div>
      <input class="api-inp" type="password" id="apiKeyInput" placeholder="sk-ant-api03-..."/>
      <button class="api-save-btn" onclick="saveApiKeyNow()">Key speichern & loslegen</button>
    </div>`;
  }

  // Scan button (only if key set)
  if(key){
    h+=`<button class="scan-btn" id="scanBtn" onclick="triggerScan()">📷 Etikett fotografieren / hochladen</button>`;
  }

  // Manual entry form
  h+=`<div class="lbl" style="margin-top:${key?'16px':'0'}">Manuell eingeben</div>
  <div class="profile-card" style="margin-bottom:14px">
    <div class="profile-field" style="margin-bottom:12px">
      <div class="field-label">Lebensmittel / Gericht</div>
      <input class="field-input" type="text" id="manName" placeholder="z.B. Magerquark 0,2%" style="font-size:15px"/>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">
      <div>
        <div class="field-label">Menge (g)</div>
        <input class="field-input" type="number" id="manGrams" placeholder="150" min="1" style="font-size:15px" oninput="calcManual()"/>
      </div>
      <div>
        <div class="field-label">Kalorien (/100g)</div>
        <input class="field-input" type="number" id="manKcal" placeholder="66" min="0" style="font-size:15px" oninput="calcManual()"/>
      </div>
      <div>
        <div class="field-label">Protein (/100g)</div>
        <input class="field-input" type="number" id="manProtein" placeholder="12" min="0" step="0.1" style="font-size:15px" oninput="calcManual()"/>
      </div>
      <div>
        <div class="field-label">Kohlenhydrate (/100g)</div>
        <input class="field-input" type="number" id="manCarbs" placeholder="4" min="0" step="0.1" style="font-size:15px" oninput="calcManual()"/>
      </div>
      <div>
        <div class="field-label">Fett (/100g)</div>
        <input class="field-input" type="number" id="manFat" placeholder="0.2" min="0" step="0.1" style="font-size:15px" oninput="calcManual()"/>
      </div>
    </div>
    <div id="manCalc" style="background:var(--s2);border-radius:var(--rxs);padding:10px 12px;margin-bottom:10px;font-size:12px;color:var(--text2);line-height:1.8;display:none"></div>
    <button class="add-to-day-btn" onclick="addManualToDay()">+ Zum Tagesprotokoll hinzufügen</button>
  </div>`;

  // Scan result (from camera)
  if(scanResult){
    const base=scanResult.per100;
    h+=`<div class="lbl">Gescanntes Etikett</div>
    <div class="scan-result">
      <div class="scan-result-title">✅ ${scanResult.name||'Lebensmittel'}</div>
      <div class="scan-item-row"><span class="scan-item-name">Kalorien</span><span class="scan-item-val">${base.kcal} kcal/100g</span></div>
      <div class="scan-item-row"><span class="scan-item-name">Protein</span><span class="scan-item-val">${base.protein} g/100g</span></div>
      <div class="scan-item-row"><span class="scan-item-name">Kohlenhydrate</span><span class="scan-item-val">${base.carbs} g/100g</span></div>
      <div class="scan-item-row"><span class="scan-item-name">Fett</span><span class="scan-item-val">${base.fat} g/100g</span></div>
      <div class="portion-row">
        <label>Gegessene Menge</label>
        <input class="portion-inp" type="number" id="portionGrams" value="100" min="1" max="2000" oninput="updatePortionCalc()"/>
        <span style="font-size:13px;color:var(--text2)">g</span>
      </div>
      <div id="portionCalc" style="background:var(--s2);border-radius:var(--rxs);padding:10px 12px;margin-bottom:10px;font-size:12px;color:var(--text2);line-height:1.8"></div>
      <button class="add-to-day-btn" onclick="addToDay()">+ Zum Tagesprotokoll hinzufügen</button>
    </div>`;
    setTimeout(updatePortionCalc,50);
  }

  // History
  if(key){
    h+=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px"><div class="lbl" style="margin:0">Heute erfasst</div><button onclick="saveApiKey('');renderScan()" style="font-size:11px;color:var(--text3);background:none;border:none;cursor:pointer">Key ändern</button></div>`;
  } else {
    h+=`<div class="lbl">Heute erfasst</div>`;
  }
  if(history.length===0){
    h+=`<div style="text-align:center;padding:20px;color:var(--text3);font-size:13px">Noch keine Mahlzeiten heute</div>`;
  } else {
    h+=`<div class="scan-history">`;
    history.forEach((item,i)=>{
      h+=`<div class="scan-hist-row">
        <div><div class="scan-hist-name">${item.name}</div><div class="scan-hist-macros">${item.protein}g P · ${item.carbs}g K · ${item.fat}g F · ${item.grams}g</div></div>
        <div style="display:flex;align-items:center;gap:10px"><div class="scan-hist-kcal">${item.kcal} kcal</div><button onclick="removeFromHistory(${i})" style="background:none;border:none;color:var(--text3);font-size:18px;cursor:pointer">×</button></div>
      </div>`;
    });
    h+=`</div>`;
    const totKcal=history.reduce((a,b)=>a+b.kcal,0);
    const totP=Math.round(history.reduce((a,b)=>a+b.protein,0)*10)/10;
    const totC=Math.round(history.reduce((a,b)=>a+b.carbs,0)*10)/10;
    const totF=Math.round(history.reduce((a,b)=>a+b.fat,0)*10)/10;
    h+=`<div class="ib g"><div class="ib-t">Summe heute</div><div class="ib-tx">${totKcal} kcal · ${totP}g Protein · ${totC}g Kohlenhydrate · ${totF}g Fett</div></div>`;
  }

  document.getElementById('vScan').innerHTML=h;
}

function saveApiKeyNow(){
  const k=document.getElementById('apiKeyInput').value.trim();
  if(!k.startsWith('sk-ant')){alert('Das sieht nicht wie ein gültiger Anthropic API Key aus.');return;}
  saveApiKey(k);renderScan();
}

function calcManual(){
  const g=parseFloat(document.getElementById('manGrams').value)||0;
  const kcal=parseFloat(document.getElementById('manKcal').value)||0;
  const protein=parseFloat(document.getElementById('manProtein').value)||0;
  const carbs=parseFloat(document.getElementById('manCarbs').value)||0;
  const fat=parseFloat(document.getElementById('manFat').value)||0;
  const el=document.getElementById('manCalc');
  if(!el)return;
  if(g>0&&(kcal||protein||carbs||fat)){
    const f=g/100;
    el.style.display='block';
    el.innerHTML=`Bei <strong style="color:var(--text)">${g}g</strong>: <strong style="color:var(--amber)">${Math.round(kcal*f)} kcal</strong> · <strong style="color:var(--green)">${Math.round(protein*f*10)/10}g Protein</strong> · ${Math.round(carbs*f*10)/10}g Kohlenhydrate · ${Math.round(fat*f*10)/10}g Fett`;
  } else {
    el.style.display='none';
  }
}

function addManualToDay(){
  const name=document.getElementById('manName').value.trim()||'Mahlzeit';
  const g=parseFloat(document.getElementById('manGrams').value)||0;
  const kcal100=parseFloat(document.getElementById('manKcal').value)||0;
  const prot100=parseFloat(document.getElementById('manProtein').value)||0;
  const carbs100=parseFloat(document.getElementById('manCarbs').value)||0;
  const fat100=parseFloat(document.getElementById('manFat').value)||0;
  if(g<=0){alert('Bitte Menge in Gramm eingeben.');return;}
  const f=g/100;
  const entry={
    name,grams:Math.round(g),
    kcal:Math.round(kcal100*f),
    protein:Math.round(prot100*f*10)/10,
    carbs:Math.round(carbs100*f*10)/10,
    fat:Math.round(fat100*f*10)/10
  };
  const hist=loadScanHistory();hist.push(entry);saveScanHistory(hist);
  const macros=loadMacros();
  macros.kcal=Math.round((macros.kcal||0)+entry.kcal);
  macros.protein=Math.round(((macros.protein||0)+entry.protein)*10)/10;
  macros.carbs=Math.round(((macros.carbs||0)+entry.carbs)*10)/10;
  macros.fat=Math.round(((macros.fat||0)+entry.fat)*10)/10;
  saveMacros(macros);
  // Clear form
  ['manName','manGrams','manKcal','manProtein','manCarbs','manFat'].forEach(id=>{
    const el=document.getElementById(id);if(el)el.value='';
  });
  renderScan();
}

function triggerScan(){document.getElementById('fileInput').click();}

function updatePortionCalc(){
  const el=document.getElementById('portionCalc');if(!el||!scanResult)return;
  const g=parseFloat(document.getElementById('portionGrams').value)||100;
  const f=g/100;
  const b=scanResult.per100;
  el.innerHTML=`Bei <strong style="color:var(--text)">${g}g</strong>: <strong style="color:var(--amber)">${Math.round(b.kcal*f)} kcal</strong> · <strong style="color:var(--green)">${Math.round(b.protein*f*10)/10}g Protein</strong> · ${Math.round(b.carbs*f*10)/10}g Kohlenhydrate · ${Math.round(b.fat*f*10)/10}g Fett`;
}

function addToDay(){
  if(!scanResult)return;
  const g=parseFloat(document.getElementById('portionGrams').value)||100;
  const f=g/100;const b=scanResult.per100;
  const entry={
    name:scanResult.name||'Lebensmittel',
    grams:Math.round(g),
    kcal:Math.round(b.kcal*f),
    protein:Math.round(b.protein*f*10)/10,
    carbs:Math.round(b.carbs*f*10)/10,
    fat:Math.round(b.fat*f*10)/10
  };
  // Add to history
  const hist=loadScanHistory();hist.push(entry);saveScanHistory(hist);
  // Add to macro totals
  const macros=loadMacros();
  macros.kcal=Math.round((macros.kcal||0)+entry.kcal);
  macros.protein=Math.round(((macros.protein||0)+entry.protein)*10)/10;
  macros.carbs=Math.round(((macros.carbs||0)+entry.carbs)*10)/10;
  macros.fat=Math.round(((macros.fat||0)+entry.fat)*10)/10;
  saveMacros(macros);
  scanResult=null;
  renderScan();
  // Brief confirmation
  const btn=document.querySelector('.add-to-day-btn');
  if(btn){btn.textContent='✓ Hinzugefügt!';btn.style.background='var(--gdim)';}
}

function removeFromHistory(i){
  const hist=loadScanHistory();
  const removed=hist.splice(i,1)[0];
  saveScanHistory(hist);
  // Subtract from macros
  const macros=loadMacros();
  macros.kcal=Math.max(0,Math.round((macros.kcal||0)-removed.kcal));
  macros.protein=Math.max(0,Math.round(((macros.protein||0)-removed.protein)*10)/10);
  macros.carbs=Math.max(0,Math.round(((macros.carbs||0)-removed.carbs)*10)/10);
  macros.fat=Math.max(0,Math.round(((macros.fat||0)-removed.fat)*10)/10);
  saveMacros(macros);
  renderScan();
}

async function handleFileSelect(event){
  const file=event.target.files[0];
  if(!file)return;
  event.target.value='';
  const key=getApiKey();if(!key)return;
  // Show loading
  const btn=document.getElementById('scanBtn');
  if(btn){btn.textContent='⏳ Wird analysiert...';btn.className='scan-btn loading';btn.disabled=true;}
  try{
    const b64=await new Promise((res,rej)=>{
      const r=new FileReader();
      r.onload=()=>res(r.result.split(',')[1]);
      r.onerror=()=>rej(new Error('Lesen fehlgeschlagen'));
      r.readAsDataURL(file);
    });
    const mime=file.type||'image/jpeg';
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({
        model:'claude-sonnet-4-6',
        max_tokens:500,
        messages:[{role:'user',content:[
          {type:'image',source:{type:'base64',media_type:mime,data:b64}},
          {type:'text',text:`Analysiere dieses Nährwertetikett und antworte NUR mit einem JSON-Objekt (kein Text davor/danach, keine Markdown-Backticks):
{"name":"Produktname","per100":{"kcal":0,"protein":0,"carbs":0,"fat":0}}
Alle Werte pro 100g. Falls Werte fehlen oder nicht lesbar sind, setze 0. Produktname kurz halten.`}
        ]}]
      })
    });
    if(!resp.ok){
      const err=await resp.json();
      throw new Error(err.error?.message||'API Fehler '+resp.status);
    }
    const data=await resp.json();
    const text=data.content.map(c=>c.text||'').join('');
    const clean=text.replace(/```json|```/g,'').trim();
    const parsed=JSON.parse(clean);
    scanResult=parsed;
  } catch(e){
    scanResult=null;
    const errMsg=e.message||'Unbekannter Fehler';
    const el=document.getElementById('vScan');
    if(el){
      const errBox=document.createElement('div');
      errBox.className='scan-error';
      errBox.innerHTML=`<strong>Fehler beim Scannen:</strong><br>${errMsg}<br><small style="opacity:.7">Tipp: Prüfe ob der API Key korrekt ist (Profil → Key ändern)</small>`;
      el.insertBefore(errBox,el.firstChild);
    }
  }
  renderScan();
}
